<script>
let currentGame = "overall";

async function load() {
  const res = await fetch("/data");
  const data = await res.json();

  const select = document.getElementById("gameSelect");

  select.innerHTML = "";

  Object.keys(data.scores).forEach(game => {
    const opt = document.createElement("option");
    opt.value = game;
    opt.textContent = game;
    select.appendChild(opt);
  });

  const scores = data.scores[currentGame] || {};

  const sorted = Object.values(scores)
    .sort((a, b) => b.points - a.points);

  const board = document.getElementById("board");

  if (!sorted.length) {
    board.innerHTML = "<div>No players yet</div>";
    return;
  }

  board.innerHTML = sorted.map((p, i) => {

    // 🧠 SAFETY FIX (prevents undefined errors)
    const name = p.name || "Unknown";
    const points = p.points ?? 0;

    return `<div class="player">
      ${i + 1}. ${name} - ${points} pts
    </div>`;
  }).join("");
}

document.getElementById("gameSelect").addEventListener("change", e => {
  currentGame = e.target.value;
  load();
});

setInterval(load, 2000);
load();
</script>
