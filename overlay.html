<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CUP LIVE</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.player {
  padding: 8px;
  margin: 5px;
  background: #111;
  border-radius: 6px;
}

.gold { color: gold; }
.silver { color: silver; }
.bronze { color: #cd7f32; }
</style>
</head>

<body>

<h1>🏆 CUP LIVE</h1>
<div id="game"></div>
<div id="board"></div>

<script>
async function load() {
  const res = await fetch("/data?t=" + Date.now());
  const data = await res.json();

  document.getElementById("game").innerText =
    "Game: " + (data.game || "Waiting...");

  const scores = Object.entries(data.scores || {})
    .sort((a,b)=>b[1]-a[1]);

  const board = document.getElementById("board");

  if (!scores.length) {
    board.innerHTML = "No players yet";
    return;
  }

  board.innerHTML = scores.map((p,i)=>{
    let cls = i==0?"gold":i==1?"silver":i==2?"bronze":"";
    return `<div class="player ${cls}">
      ${i+1}. ${p[0]} — ${p[1]}
    </div>`;
  }).join("");
}

setInterval(load, 1000);
load();
</script>

</body>
</html>
